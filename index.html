<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما المستقبل | Al-Mustaqbal Cinema</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --dark-bg: #0b0b0b;
            --card-bg: #181818;
            --text-color: #ffffff;
            --gray: #808080;
            --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--netflix-red); }

        /* Navbar */
        .navbar {
            padding: 1rem 4%;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            transition: background 0.5s;
        }
        .navbar.scrolled { background: var(--dark-bg); border-bottom: 1px solid #222; }

        .brand {
            color: var(--netflix-red);
            font-size: 2.2rem; font-weight: 900;
            text-decoration: none; letter-spacing: -2px;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; margin-right: 30px; }
        .nav-links a { color: #e5e5e5; text-decoration: none; font-size: 0.9rem; }

        .search-box { position: relative; flex-grow: 1; max-width: 400px; }
        .search-input {
            width: 100%; background: rgba(0,0,0,0.7); border: 1px solid #444;
            color: white; padding: 10px 15px; border-radius: 25px; outline: none;
        }
        .search-input:focus { border-color: var(--netflix-red); }

        /* Hero Section */
        .hero {
            height: 80vh; position: relative;
            background: linear-gradient(to top, var(--dark-bg) 5%, transparent 40%),
                        linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 100%),
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 4%;
        }

        .hero-content { max-width: 700px; animation: fadeInUp 1s ease; }
        .hero-content h1 { font-size: 4rem; font-weight: 800; margin-bottom: 0.5rem; }
        .hero-content p { font-size: 1.2rem; color: #ddd; margin-bottom: 2rem; }

        /* Content Grid */
        .main-content { padding: 3rem 4%; margin-top: -100px; position: relative; z-index: 10; }
        .category-row { margin-bottom: 3rem; }
        .row-header { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }

        .movie-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
        }

        .card {
            position: relative; border-radius: 6px; cursor: pointer;
            transition: var(--transition); z-index: 1;
        }
        .card:hover { transform: scale(1.2); z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; }
        .card-info {
            position: absolute; bottom: 0; width: 100%; padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0; transition: 0.3s;
        }
        .card:hover .card-info { opacity: 1; }

        /* Video Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-content { width: 95%; max-width: 1100px; position: relative; background: #000; }
        .close-btn { position: absolute; top: -45px; right: 0; color: white; font-size: 2.5rem; cursor: pointer; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div style="display:flex; align-items:center;">
            <a href="#" class="brand">المستقبل نت</a>
            <ul class="nav-links">
                <li><a href="#anime-section">أنمي</a></li>
                <li><a href="#movies-section">أفلام</a></li>
            </ul>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="بحث عن فيلم، أنمي...">
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>عالمك الخاص</h1>
            <p>مشاهدة مباشرة بدون إعلانات وبأعلى جودة ممكنة.</p>
        </div>
    </header>

    <main class="main-content">
        <section class="category-row" id="anime-section">
            <h2 class="row-header">قسم الأنمي</h2>
            <div class="movie-grid" id="animeGrid"></div>
        </section>

        <section class="category-row" id="movies-section">
            <h2 class="row-header">قسم الأفلام</h2>
            <div class="movie-grid" id="movieGrid"></div>
        </section>
    </main>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <div class="video-container">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        let moviesData = [];

        async function loadData() {
            try {
                const res = await fetch('data.json');
                moviesData = await res.json();
                renderAll();
            } catch (e) {
                console.log("Waiting for data.json...");
            }
        }

        function createCard(item) {
            return `
                <div class="card" onclick="openPlayer('${item.url}')">
                    <img src="${item.poster}" alt="${item.title}">
                    <div class="card-info">
                        <h4>${item.title}</h4>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            const animeGrid = document.getElementById('animeGrid');
            const movieGrid = document.getElementById('movieGrid');
            
            animeGrid.innerHTML = moviesData.filter(i => i.category === "أنمي").map(createCard).join('');
            movieGrid.innerHTML = moviesData.filter(i => i.category === "أفلام").map(createCard).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = moviesData.filter(i => i.title.toLowerCase().includes(val));
            document.getElementById('animeGrid').innerHTML = filtered.filter(i => i.category === "أنمي").map(createCard).join('');
            document.getElementById('movieGrid').innerHTML = filtered.filter(i => i.category === "أفلام").map(createCard).join('');
        });

        function openPlayer(url) {
            document.getElementById('mainPlayer').src = url;
            document.getElementById('videoModal').style.display = 'flex';
        }

        document.getElementById('closeBtn').onclick = () => {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
        };

        window.onscroll = () => {
            if (window.scrollY > 50) document.getElementById('navbar').classList.add('scrolled');
            else document.getElementById('navbar').classList.remove('scrolled');
        };

        loadData();
    </script>
</body>
</html>
