<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما المستقبل | Al-Mustaqbal Cinema</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --dark-bg: #0b0b0b;
            --card-bg: #181818;
            --text-color: #ffffff;
            --gray: #808080;
            --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--netflix-red); }

        /* الهيدر والبحث */
        .navbar {
            padding: 1rem 4%;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            transition: background 0.5s;
        }
        .navbar.scrolled { background: var(--dark-bg); border-bottom: 1px solid #222; }

        .brand {
            color: var(--netflix-red);
            font-size: 2.2rem; font-weight: 900;
            text-decoration: none; letter-spacing: -2px;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; margin-right: 30px; }
        .nav-links a { color: #e5e5e5; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--gray); }

        /* صندوق البحث المطور */
        .search-box { position: relative; flex-grow: 1; max-width: 400px; }
        .search-input {
            width: 100%; background: rgba(0,0,0,0.7); border: 1px solid #444;
            color: white; padding: 10px 15px; border-radius: 25px; outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--netflix-red); background: #000; }

        #suggestionsList {
            position: absolute; top: 110%; left: 0; right: 0;
            background: #181818; border: 1px solid #333;
            border-radius: 10px; z-index: 2000; display: none;
            max-height: 250px; overflow-y: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .suggestion-item {
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #222;
            transition: 0.3s; text-align: right;
        }
        .suggestion-item:hover { background: #252525; color: var(--netflix-red); }

        /* واجهة العرض الكبيرة (Hero) */
        .hero {
            height: 85vh; position: relative;
            background: linear-gradient(to top, var(--dark-bg) 5%, transparent 40%),
                        linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 100%),
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 4%;
        }

        .hero-content { max-width: 700px; animation: fadeInUp 1s ease; }
        .hero-content h1 { font-size: 4rem; font-weight: 800; margin-bottom: 0.5rem; color: #fff; }
        .hero-content p { font-size: 1.3rem; color: #ddd; margin-bottom: 2rem; }

        /* الشبكة والمحتوى */
        .main-content { padding: 3rem 4%; margin-top: -150px; position: relative; z-index: 10; }
        .category-row { margin-bottom: 4rem; }
        .row-header { font-size: 1.6rem; font-weight: 600; margin-bottom: 1.2rem; border-right: 4px solid var(--netflix-red); padding-right: 15px; }

        .movie-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
        }

        .card {
            position: relative; border-radius: 6px; cursor: pointer;
            transition: var(--transition); z-index: 1;
        }
        .card:hover { transform: scale(1.25); z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; display: block; }
        .card-info {
            position: absolute; bottom: 0; width: 100%; padding: 15px;
            background: linear-gradient(to top, #181818 0%, transparent 100%);
            opacity: 0; transition: 0.3s;
        }
        .card:hover .card-info { opacity: 1; }
        .card-info h4 { font-size: 0.9rem; }

        /* المشغل (Modal) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-content { width: 95%; max-width: 1100px; position: relative; background: #000; border-radius: 10px; overflow: hidden; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 3rem; cursor: pointer; z-index: 10; line-height: 1; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .search-box { max-width: 180px; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div style="display:flex; align-items:center;">
            <a href="#" class="brand">المستقبل</a>
            <ul class="nav-links">
                <li><a href="#anime-section">أنمي</a></li>
                <li><a href="#movies-section">أفلام</a></li>
            </ul>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="بحث..." autocomplete="off">
            <div id="suggestionsList"></div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>مغامرتك القادمة</h1>
            <p>مكتبة خاصة وحصرية، بدون إعلانات، بجودة فائقة السرعة.</p>
        </div>
    </header>

    <main class="main-content">
        <section class="category-row" id="anime-section">
            <h2 class="row-header">عالم الأنمي</h2>
            <div class="movie-grid" id="animeGrid"></div>
        </section>

        <section class="category-row" id="movies-section">
            <h2 class="row-header">أحدث الأفلام</h2>
            <div class="movie-grid" id="movieGrid"></div>
        </section>
    </main>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <div class="video-container">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        let moviesData = [];
        const searchInput = document.getElementById('searchInput');
        const suggestionsList = document.getElementById('suggestionsList');

        async function loadData() {
            try {
                const res = await fetch('data.json');
                moviesData = await res.json();
                renderAll(moviesData);
            } catch (e) {
                console.log("Waiting for data.json...");
            }
        }

        function createCard(item) {
            return `
                <div class="card" onclick="openPlayer('${item.url}')">
                    <img src="${item.poster}" alt="${item.title}">
                    <div class="card-info">
                        <h4>${item.title}</h4>
                    </div>
                </div>
            `;
        }

        function renderAll(data) {
            const animeGrid = document.getElementById('animeGrid');
            const movieGrid = document.getElementById('movieGrid');
            
            animeGrid.innerHTML = data.filter(i => i.category === "أنمي").map(createCard).join('');
            movieGrid.innerHTML = data.filter(i => i.category === "أفلام").map(createCard).join('');
        }

        // محرك البحث مع الاقتراحات
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            suggestionsList.innerHTML = '';

            if (val.length > 0) {
                const matches = moviesData.filter(i => i.title.toLowerCase().includes(val));
                
                if (matches.length > 0) {
                    suggestionsList.style.display = 'block';
                    matches.slice(0, 6).forEach(match => {
                        const div = document.createElement('div');
                        div.classList.add('suggestion-item');
                        div.innerText = match.title;
                        div.onclick = () => {
                            searchInput.value = match.title;
                            suggestionsList.style.display = 'none';
                            renderAll([match]);
                        };
                        suggestionsList.appendChild(div);
                    });
                } else {
                    suggestionsList.style.display = 'none';
                }
                renderAll(matches); // تحديث الجريد فوراً أثناء الكتابة
            } else {
                suggestionsList.style.display = 'none';
                renderAll(moviesData);
            }
        });

        function openPlayer(url) {
            if(!url || url === "#") return alert("الرابط غير متاح حالياً");
            document.getElementById('mainPlayer').src = url;
            document.getElementById('videoModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('closeBtn').onclick = () => {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            document.body.style.overflow = 'auto';
        };

        // إغلاق الاقتراحات عند النقر خارجاً
        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) suggestionsList.style.display = 'none';
        });

        window.onscroll = () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        };

        loadData();
    </script>
</body>
</html>
