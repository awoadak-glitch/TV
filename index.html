<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما المستقبل | Al-Mustaqbal Cinema</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --dark-bg: #0b0b0b;
            --card-bg: #181818;
            --text-color: #ffffff;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-color); overflow-x: hidden; scroll-behavior: smooth; }

        /* Navbar */
        .navbar {
            padding: 1rem 4%; display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: fixed; top: 0; width: 100%; z-index: 1000; transition: 0.3s;
        }
        .navbar.scrolled { background: #000; border-bottom: 1px solid #222; }
        .brand { color: var(--netflix-red); font-size: 2rem; font-weight: 900; text-decoration: none; }
        .search-input {
            background: rgba(0,0,0,0.7); border: 1px solid #444; color: white;
            padding: 8px 15px; border-radius: 20px; outline: none; width: 250px;
        }

        /* Hero */
        .hero {
            height: 60vh; background: linear-gradient(to top, var(--dark-bg), transparent), url('https://images.unsplash.com/photo-1574267431644-4ed38cd85229?q=80&w=2000&auto=format&fit=crop') center/cover;
            display: flex; align-items: center; padding: 0 4%;
        }

        /* Main Content */
        .main-content { padding: 2rem 4%; margin-top: -50px; position: relative; z-index: 10; }
        .row-header { font-size: 1.5rem; margin-bottom: 1.5rem; border-right: 4px solid var(--netflix-red); padding-right: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }

        /* Card */
        .card { cursor: pointer; transition: var(--transition); border-radius: 8px; overflow: hidden; position: relative; background: var(--card-bg); }
        .card:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-title { padding: 12px; text-align: center; font-size: 0.9rem; font-weight: bold; }

        /* Episodes View */
        #episodesView { display: none; animation: fadeIn 0.5s ease; padding-top: 100px; }
        .back-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { background: var(--netflix-red); }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .episode-item { 
            background: #1f1f1f; padding: 20px; text-align: center; border-radius: 8px; 
            cursor: pointer; transition: 0.3s; position: relative; border: 1px solid #333;
        }
        .episode-item:hover { background: var(--netflix-red); border-color: var(--netflix-red); transform: translateY(-5px); }
        .progress-tag { font-size: 0.7rem; color: #46d369; display: block; margin-top: 5px; }

        /* Modal Player */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { width: 100%; height: 100%; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 3rem; cursor: pointer; z-index: 6000; opacity: 0.5; transition: 0.3s; }
        .close-btn:hover { opacity: 1; }
        .video-wrapper { width: 100%; height: 100%; }
        .video-wrapper iframe { width: 100%; height: 100%; border: 0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="#" class="brand" onclick="showMain()">المستقبل</a>
        <input type="text" id="searchInput" class="search-input" placeholder="بحث عن مسلسل أو أنمي...">
    </nav>

    <div id="mainView">
        <header class="hero">
            <h1>مكتبتك الخاصة</h1>
        </header>
        <main class="main-content">
            <h2 class="row-header">المحتوى المتاح</h2>
            <div class="grid" id="mainGrid"></div>
        </main>
    </div>

    <div id="episodesView" class="main-content">
        <button class="back-btn" onclick="showMain()">← العودة للرئيسية</button>
        <h2 id="seriesTitle" class="row-header" style="font-size: 2rem; margin-bottom: 30px;"></h2>
        <div class="episode-list" id="episodeList"></div>
    </div>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <div class="video-wrapper">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentVideoId = ""; // لتحديد وقت الحلقة الحالية

        async function init() {
            try {
                const res = await fetch('data.json');
                allData = await res.json();
                renderMain(allData);
            } catch (e) { console.log("خطأ في تحميل البيانات التجريبية..."); }
        }

        function renderMain(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = data.map((item, index) => `
                <div class="card" onclick="openSeries(${index})">
                    <img src="${item.poster}" alt="${item.title}">
                    <div class="card-title">${item.title}</div>
                </div>
            `).join('');
        }

        function openSeries(index) {
            const series = allData[index];
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('episodesView').style.display = 'block';
            document.getElementById('seriesTitle').innerText = series.title;
            
            const list = document.getElementById('episodeList');
            list.innerHTML = series.episodes.map(ep => {
                const savedTime = localStorage.getItem(btoa(ep.url)); // جلب الوقت المحفوظ
                const progressMsg = savedTime ? `<span class="progress-tag">تابع من ${formatTime(savedTime)}</span>` : "";
                
                return `
                <div class="episode-item" onclick="watch('${ep.url}')">
                    <strong>${ep.name}</strong>
                    ${progressMsg}
                </div>
                `;
            }).join('');
            window.scrollTo(0,0);
        }

        function showMain() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('episodesView').style.display = 'none';
            renderMain(allData);
        }

        function watch(url) {
            const savedTime = localStorage.getItem(btoa(url)) || 0;
            currentVideoId = btoa(url);

            // إضافة وقت البدء للرابط (يعمل مع معظم المشغلات التي تدعم t=)
            let finalUrl = url;
            if (savedTime > 0) {
                finalUrl += (url.includes('?') ? '&' : '?') + "t=" + savedTime;
            }

            document.getElementById('videoPlayer').src = finalUrl;
            document.getElementById('videoModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // تنبيه: السيرفرات الخارجية لا تسمح للمتصفح بمعرفة الوقت بدقة 100%
            // لكننا سنقوم بحفظ "أننا فتحنا الحلقة" كبداية.
        }

        document.getElementById('closeBtn').onclick = () => {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('videoPlayer').src = '';
            document.body.style.overflow = 'auto';
        };

        // تحويل الثواني لدقائق للعرض
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // مراقبة النزول لتغيير لون النافبار
        window.onscroll = () => {
            if (window.scrollY > 50) document.getElementById('navbar').classList.add('scrolled');
            else document.getElementById('navbar').classList.remove('scrolled');
        };

        // البحث السريع
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(i => i.title.toLowerCase().includes(val));
            renderMain(filtered);
            showMain();
        });

        init();
    </script>
</body>
</html>
